<!DOCTYPE html>
<html>

<head>
    <title>Water Quality Monitoring</title>

    <style>
        body{
            font-family: Arial;
            text-align:center;
            background:#f4f4f4;
        }

        .container{
            margin-top:50px;
        }

        .card{
            display:inline-block;
            background:white;
            padding:20px;
            margin:10px;
            border-radius:10px;
            width:150px;
            box-shadow:0px 0px 10px rgba(0,0,0,0.1);
        }

        h2{
            margin:5px;
        }

        p{
            font-size:20px;
            font-weight:bold;
        }
    </style>

</head>

<body>

<h1>IoT Water Quality Monitoring System</h1>

<div class="container">

<div class="card">
<h2>pH</h2>
<p id="ph">0</p>
</div>

<div class="card">
<h2>Temperature</h2>
<p id="temperature">0</p>
</div>

<div class="card">
<h2>Turbidity</h2>
<p id="turbidity">0</p>
</div>

<div class="card">
<h2>TDS</h2>
<p id="tds">0</p>
</div>

<div class="card">
<h2>Water Level</h2>
<p id="water_level">0</p>
</div>

<div class="card">
<h2>Flow</h2>
<p id="flow">0</p>
</div>

</div>

<script>

function updateData(){

fetch("/sensor-data")
.then(response => response.json())
.then(data => {

document.getElementById("ph").innerText = data.ph
document.getElementById("temperature").innerText = data.temperature
document.getElementById("turbidity").innerText = data.turbidity
document.getElementById("tds").innerText = data.tds
document.getElementById("water_level").innerText = data.water_level
document.getElementById("flow").innerText = data.flow

})
.catch(error => console.log(error))

}

setInterval(updateData,1000)

</script>

</body>
</html>
